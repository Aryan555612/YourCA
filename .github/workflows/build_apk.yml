name: Build Android App

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: # Allows manual trigger from the GitHub Actions page

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Clean build caches
        run: |
          flutter clean
          cd android
          rm -rf .gradle
          ./gradlew clean --no-daemon || true

      - name: Generate Release Keystore
        run: |
          keytool -genkey -v -keystore android/app/release.jks -keyalg RSA -keysize 2048 -validity 10000 -alias yourcakey -storepass yourcapassword -keypass yourcapassword -dname "CN=YourCA, OU=Development, O=YourCA, L=New Delhi, S=Delhi, C=IN"

      - name: Build release APK (for sideload/WhatsApp sharing)
        env:
          ANDROID_KEYSTORE_PATH: "release.jks"
          ANDROID_KEYSTORE_PASSWORD: "yourcapassword"
          ANDROID_KEY_ALIAS: "yourcakey"
          ANDROID_KEY_PASSWORD: "yourcapassword"
        run: flutter build apk --release

      - name: Build release App Bundle (AAB for Google Play Store upload)
        env:
          ANDROID_KEYSTORE_PATH: "release.jks"
          ANDROID_KEYSTORE_PASSWORD: "yourcapassword"
          ANDROID_KEY_ALIAS: "yourcakey"
          ANDROID_KEY_PASSWORD: "yourcapassword"
        run: flutter build appbundle --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: build/app/outputs/bundle/release/app-release.aab

name: Build Signed Release APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: # Allows manual trigger from GitHub Actions page

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Clean build caches
        run: |
          flutter clean
          cd android
          rm -rf .gradle
          ./gradlew clean --no-daemon || true

      # ── Verify keystore is present in the repository ───────────────────────────
      - name: Verify Keystore File
        run: |
          if [ ! -f "android/app/yourca-release.jks" ]; then
            echo "::error::Release keystore file is missing at android/app/yourca-release.jks!"
            exit 1
          fi
          echo "Keystore file detected successfully."

      # ── Build signed release APK (for sharing via WhatsApp) ───────────────────
      - name: Build signed release APK
        run: flutter build apk --release

      # ── Build signed AAB (for future Play Store use) ───────────────────────────
      - name: Build signed App Bundle (AAB)
        run: flutter build appbundle --release

      # ── Upload APK (WhatsApp-sharable) ────────────────────────────────────────
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: YourCA-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      # ── Upload AAB (Play Store ready) ─────────────────────────────────────────
      - name: Upload Release AAB
        uses: actions/upload-artifact@v4
        with:
          name: YourCA-release-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30


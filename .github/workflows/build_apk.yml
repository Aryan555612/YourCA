name: Build Signed Release APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: # Allows manual trigger from GitHub Actions page

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Clean build caches
        run: |
          flutter clean
          cd android
          rm -rf .gradle
          ./gradlew clean --no-daemon || true

      # ── Decode the permanent keystore from GitHub Secrets ─────────────────────
      # Go to: GitHub repo → Settings → Secrets → Actions → New repository secret
      # Add these 4 secrets:
      #   KEYSTORE_BASE64       → base64 of yourca-release.jks (see android/app/yourca-release.jks.b64.txt)
      #   KEYSTORE_PASSWORD     → YourCA@2024#Secure
      #   KEY_ALIAS             → yourcakey
      #   KEY_PASSWORD          → YourCA@2024#Secure
      - name: Decode Release Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/yourca-release.jks
          echo "Keystore decoded successfully"

      # ── Build signed release APK (for sharing via WhatsApp) ───────────────────
      - name: Build signed release APK
        env:
          ANDROID_KEYSTORE_PATH: "yourca-release.jks"
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: flutter build apk --release

      # ── Build signed AAB (for future Play Store use) ───────────────────────────
      - name: Build signed App Bundle (AAB)
        env:
          ANDROID_KEYSTORE_PATH: "yourca-release.jks"
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: flutter build appbundle --release

      # ── Upload APK (WhatsApp-sharable) ────────────────────────────────────────
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: YourCA-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      # ── Upload AAB (Play Store ready) ─────────────────────────────────────────
      - name: Upload Release AAB
        uses: actions/upload-artifact@v4
        with:
          name: YourCA-release-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30


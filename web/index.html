<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="YourCA — Personal finance tracking app. Track expenses, income, and savings across all your accounts.">
  <meta name="theme-color" content="#0A0E1A">

  <!-- Open Graph -->
  <meta property="og:title" content="YourCA — Finance Tracker">
  <meta property="og:description" content="Smart personal finance tracking with automatic categorization and savings insights.">
  <meta property="og:type" content="website">

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <title>YourCA — Finance Tracker</title>

  <!-- Inline critical CSS for splash -->
  <style>
    body {
      background-color: #0A0E1A;
      margin: 0;
      padding: 0;
    }
    #loading-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #F1F5F9;
    }
    .logo-container {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #4F46E5, #7C3AED);
      border-radius: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
      animation: pulse 1.5s infinite;
    }
    .logo-container svg {
      width: 44px;
      height: 44px;
      fill: white;
    }
    h1 {
      font-size: 28px;
      font-weight: 700;
      margin: 0 0 8px;
      letter-spacing: -0.5px;
    }
    p {
      font-size: 15px;
      color: #94A3B8;
      margin: 0;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(79, 70, 229, 0.4); }
      50% { box-shadow: 0 0 0 16px rgba(79, 70, 229, 0); }
    }
  </style>
</head>
<body>
  <!-- Loading screen shown while Flutter initializes -->
  <div id="loading-screen">
    <div class="logo-container">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M21 18v1c0 1.1-.9 2-2 2H5c-1.11 0-2-.9-2-2V5c0-1.1.89-2 2-2h14c1.1 0 2 .9 2 2v1h-9c-1.11 0-2 .9-2 2v8c0 1.1.89 2 2 2h9zm-9-2h10V8H12v8zm4-2.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/>
      </svg>
    </div>
    <h1>YourCA</h1>
    <p>Personal Finance Tracker</p>
  </div>

  <script>
    window.addEventListener('flutter-first-frame', function() {
      const screen = document.getElementById('loading-screen');
      if (screen) {
        screen.style.transition = 'opacity 0.3s';
        screen.style.opacity = '0';
        setTimeout(() => screen.remove(), 300);
      }
    });
  </script>
  <div id="recaptcha-container"></div>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
